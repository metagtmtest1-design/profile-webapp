name = "portfolio-site"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Common vars (defaults for local dev)
[vars]
ENVIRONMENT = "local"
SITE_URL = "http://localhost:8788"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
BOOKING_CALENDAR_ID = "placeholder-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "placeholder-personal@gmail.com"

# Local bindings for `wrangler pages dev --local`
# Prod ID used for local top-level too (so `migrations apply` without --env works)
# Alpha ID: 30b1ea40-63cd-41ef-84d5-2d9007bea311, Prod ID: f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b
[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

# R2 disabled for Slice 0 without billing - uncomment when R2 enabled via dashboard
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "portfolio-images"

# Preview: PRs -> <hash>.portfolio-site.pages.dev
[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "portfolio-db-preview"
database_id = "preview-placeholder-id"

# [[env.preview.r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "portfolio-images-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
SITE_URL = "https://preview.portfolio-site.pages.dev"
BOOKING_CALENDAR_ID = "preview-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "preview-personal@gmail.com"

# Alpha: alpha.somewebsite.com -> branch alpha
[env.alpha]
[[env.alpha.d1_databases]]
binding = "DB"
database_name = "portfolio-db-alpha"
database_id = "30b1ea40-63cd-41ef-84d5-2d9007bea311"

# [[env.alpha.r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "portfolio-images-alpha"

[env.alpha.vars]
ENVIRONMENT = "alpha"
SITE_URL = "https://alpha.somewebsite.com"
BOOKING_CALENDAR_ID = "alpha-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "alpha-personal@gmail.com"

# Production: somewebsite.com -> branch main
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

# [[env.production.r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "portfolio-images"

[env.production.vars]
ENVIRONMENT = "production"
SITE_URL = "https://somewebsite.com"
BOOKING_CALENDAR_ID = "prod-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "prod-personal@gmail.com"
