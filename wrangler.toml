name = "portfolio-site"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Wrangler config for Pages — D1/R2 bindings + non-PII vars in toml, PII/calendar IDs as Secrets via Dashboard
# Why: Dashboard locks plaintext vars when wrangler.toml exists: "Only Secrets can be managed via Dashboard"
# So we keep non-PII vars (working hours, SITE_URL, ENVIRONMENT) in toml (public ok), and PII (personal email + booking calendar IDs) as Encrypted Secrets via Dashboard (not in public GitHub)
# IDs: Alpha D1 30b1ea40-63cd-41ef-84d5-2d9007bea311, Prod D1 f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b
# Booking calendars: Alpha 4b32...bf4a0@group, Prod 33b9...5847a@group, Personal metagtmtest1@gmail.com — stored as Encrypted Secrets via Dashboard (not in public repo)
# SA: portfolio-calendar@portfolio-webapp-503319.iam.gserviceaccount.com — JSON as GCAL_SERVICE_ACCOUNT_KEY secret (encrypted)

# Non-PII vars for local dev (public ok)
# SLOT_DURATION_MINUTES configurable multiple of 15 per requirement (15,30,45,60...)
# EXCLUDE_TODAY option not taking any schedule today — true to start from tomorrow
[vars]
ENVIRONMENT = "local"
SITE_URL = "http://localhost:8788"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
EXCLUDE_TODAY = "false"

# Local D1/R2 for `wrangler pages dev --local`
[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images"

# Preview env: alpha branch https://alpha.profile-webapp.pages.dev (Branch control Custom alpha only)
[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "portfolio-db-alpha"
database_id = "30b1ea40-63cd-41ef-84d5-2d9007bea311"

[[env.preview.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images-alpha"

[env.preview.vars]
ENVIRONMENT = "alpha"
SITE_URL = "https://alpha.profile-webapp.pages.dev"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
EXCLUDE_TODAY = "false"
# BOOKING_CALENDAR_ID and PERSONAL_CALENDAR_ID intentionally NOT here — set as Encrypted Secrets via Dashboard to avoid PII in public GitHub

# Production env: main branch https://profile-webapp.pages.dev
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images"

[env.production.vars]
ENVIRONMENT = "production"
SITE_URL = "https://profile-webapp.pages.dev"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
EXCLUDE_TODAY = "false"
# BOOKING and PERSONAL as Encrypted Secrets via Dashboard

