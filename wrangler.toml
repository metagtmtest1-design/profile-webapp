name = "portfolio-site"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Top-level vars for local dev (wrangler pages dev --local)
# These are not inherited by env.production/preview, so we duplicate below too
[vars]
ENVIRONMENT = "local"
SITE_URL = "http://localhost:8788"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
BOOKING_CALENDAR_ID = "placeholder-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "placeholder-personal@gmail.com"

# Local D1 for `wrangler pages dev --local` and `d1 migrations apply --local`
# Prod IDs used: Alpha 30b1ea40-63cd-41ef-84d5-2d9007bea311, Prod f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b
[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

# R2 now enabled — active for Slice 0+
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images"

# Preview env: used for all preview branches including alpha and PRs
# For Slice 0, preview uses alpha DB so alpha.somewebsite.com gets alpha data (isolated from prod)
# Maps to: pages, sections, etc from alpha DB
[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "portfolio-db-alpha"
database_id = "30b1ea40-63cd-41ef-84d5-2d9007bea311"

[[env.preview.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images-alpha"

[env.preview.vars]
ENVIRONMENT = "alpha"
SITE_URL = "https://alpha.somewebsite.com"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
BOOKING_CALENDAR_ID = "alpha-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "alpha-personal@gmail.com"

# Production env: used for main branch → somewebsite.com
# For Slice 0, prod uses prod DB
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "f6dfc0c2-a7db-4e4a-b2de-abc5926fbf8b"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "portfolio-images"

[env.production.vars]
ENVIRONMENT = "production"
SITE_URL = "https://somewebsite.com"
WORKING_HOURS_START = "09:00"
WORKING_HOURS_END = "17:00"
WORKING_DAYS = "1,2,3,4,5"
SLOT_DURATION_MINUTES = "30"
BOOKING_CALENDAR_ID = "prod-booking@group.calendar.google.com"
PERSONAL_CALENDAR_ID = "prod-personal@gmail.com"
